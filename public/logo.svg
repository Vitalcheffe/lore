<svg viewBox="0 0 512 512" xmlns="http://www.w3.org/2000/svg">
  <!-- ClearPath AI Logo Mark -->
  <!-- C-arc (Clarity) + Forward path (Direction) + Insight point (AI) -->
  
  <!-- C-shaped arc: ~260° of a circle, opening on the right -->
  <!-- Center: (220, 256), Radius: 155 -->
  <path 
    d="M 318 138 A 155 155 0 1 0 318 374" 
    stroke="#ffffff" 
    stroke-width="50" 
    stroke-linecap="round" 
    fill="none"
  />
  
  <!-- Forward path extending from the C opening -->
  <!-- Curves upward-right suggesting progress and clarity -->
  <path 
    d="M 318 138 C 358 122, 404 118, 448 132" 
    stroke="#ffffff" 
    stroke-width="42" 
    stroke-linecap="round" 
    fill="none"
  />
  
  <!-- AI Insight accent at the path tip -->
  <circle cx="450" cy="133" r="14" fill="#3b82f6"/>
</svg>
